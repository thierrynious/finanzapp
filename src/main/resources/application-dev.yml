server:
  port: 8081

spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false

  datasource:
    url: jdbc:h2:mem:devdb;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false

# ⭐ WICHTIG: management AUF ROOT-LEVEL
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
